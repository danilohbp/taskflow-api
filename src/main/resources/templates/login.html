<!doctype html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title>Login • Taskflow</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            background: #ffffff;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .login-header i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-body {
            padding: 2rem;
        }

        .form-control {
            border-radius: 12px;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 0.7rem;
            font-weight: 600;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #6c757d;
            text-align: center;
            margin-top: 1rem;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25);
            border-color: #2563eb;
        }

        .brand-title {
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="login-header">
        <i class="fa-solid fa-layer-group"></i>
        <div class="h4 brand-title mb-0">Taskflow</div>
        <div class="small opacity-75">Gerencie tarefas com controle e segurança</div>
    </div>

    <div class="login-body">

        <!-- Mensagem de erro -->
        <div th:if="${param.error}" class="alert alert-danger text-center">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Usuário ou senha inválidos.
        </div>

        <!-- Logout -->
        <div th:if="${param.logout}" class="alert alert-success text-center">
            <i class="fa-solid fa-check-circle"></i>
            Você saiu com sucesso.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-user text-secondary"></i>
                    </span>
                    <input type="text"
                           class="form-control"
                           name="username"
                           placeholder="Digite seu usuário"
                           required
                           autofocus/>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-lock text-secondary"></i>
                    </span>
                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Digite sua senha"
                           required/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-right-to-bracket me-1"></i>
                Entrar
            </button>

        </form>

        <div class="footer-text">
            © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}"></span>
            Taskflow API • Desenvolvido por Danilo
        </div>

    </div>
</div>
</body>
</html>
