<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title th:text="${pageTitle} ?: 'Taskflow'">Taskflow</title>

    <!-- WebJars (sem CDN) -->
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet">

    <!-- Estilos globais do projeto -->
    <style>
        :root {
            --tf-bg: #f6f7fb;
            --tf-card: #ffffff;
            --tf-muted: #6c757d;
            --tf-border: #e9ecef;
        }

        body { background: var(--tf-bg); }
        .page-wrap { max-width: 1100px; }
        .muted { color: var(--tf-muted); }

        .card {
            border: 1px solid var(--tf-border);
            border-radius: 16px;
        }

        .shadow-soft {
            box-shadow: 0 14px 30px rgba(16, 24, 40, 0.08);
        }

        .badge-soft {
            background: #f1f3f5;
            color: #343a40;
            border: 1px solid var(--tf-border);
        }

        .table td, .table th { vertical-align: middle; }

        .users-row {
            transition: all .15s ease;
        }

        .users-row:hover {
            background-color: #f8f9fc;
            transform: translateY(-1px);
        }

        .table thead th {
            font-weight: 600;
            letter-spacing: .04em;
        }

        .bg-success-subtle {
            background: #e8f7ef;
        }

        .bg-secondary-subtle {
            background: #eef0f2;
        }
    </style>

    <!-- Bootstrap JS bundle (se você usar dropdown, modal etc.) -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
</head>
</html>
