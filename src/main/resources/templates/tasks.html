<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Tasks - Taskflow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .top { display:flex; gap:12px; align-items:center; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="top">
    <h2 style="margin:0;">Tasks</h2>
    <a href="/users">Ver Users</a>
</div>

<div th:if="${#lists.isEmpty(tasks)}">
    <p>Nenhuma task cadastrada.</p>
</div>

<table th:if="${!#lists.isEmpty(tasks)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>UserId</th>
        <th>Título</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
        <tr th:each="t : ${tasks}">
            <td th:text="${t.id()}"></td>
            <td th:text="${t.title()}"></td>
            <td th:text="${t.status()}"></td>
            <td th:text="${t.priority()}"></td>
            <td th:text="${t.dueDate()} ?: '-'"></td>
            <td th:text="${t.assigneeName()} ?: '—'"></td>
            <td th:text="${t.reporterName()}"></td>
        </tr>
    </tbody>
</table>
</body>
</html>
